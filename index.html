<style>
  :root {
    --navy:    #0a3d6b;

    --sky:     #e8f4fd;
    --green:   #00875a;

    --greenlt: #e6f7f1;
    --white:   #ffffff;
    --gray50:  #f7f9fc;
    --gray100: #edf1f7;
    --gray200: #d4dde8;
    --gray400: #8fa3bb;
    --gray600: #4a6278;

    --danger:  #d93025;

    --text:    #1e3048;
    --text2:   #5a7a96;
    --sans:    'Outfit', sans-serif;
    --mono:    'JetBrains Mono', monospace;
    --shadow:  0 2px 12px rgba(10,61,107,0.10);
    --shadow2: 0 4px 24px rgba(10,61,107,0.15);
    --radius:  10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--gray50); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--gray100); }
  ::-webkit-scrollbar-thumb { background: var(--gray200); border-radius: 3px; }

  /* \u2500\u2500 SCREENS \u2500\u2500 */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* \u2500\u2500 LOGIN \u2500\u2500 */
  #loginScreen {
    background: linear-gradient(145deg, var(--navy) 0%, var(--navy2) 40%, var(--blue) 100%);
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #loginScreen::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .login-glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,135,90,0.18) 0%, transparent 65%);
    bottom: -200px; right: -100px;
    pointer-events: none;
  }
  .login-card {
    background: var(--white);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%; max-width: 400px;
    position: relative; z-index: 1;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .login-header { margin-bottom: 32px; }
  .login-brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 18px;
  }
  .brand-text { font-size: 20px; font-weight: 700; color: var(--navy); letter-spacing: -0.5px; }
  .brand-text span { color: var(--green); }
  .login-subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .login-divider { height: 1px; background: var(--gray100); margin: 0 0 24px; }

  /* \u2500\u2500 INPUTS \u2500\u2500 */
  .field-group { margin-bottom: 16px; }
  .field-label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--text2); margin-bottom: 6px;
  }
  input[type="text"], input[type="password"], input[type="date"],
  input[type="time"], input[type="number"], textarea, select {
    width: 100%;
    background: var(--gray50);
    border: 1.5px solid var(--gray200);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26,111,186,0.12);
    background: var(--white);
  }
  input[type="password"] { font-family: var(--mono); letter-spacing: 5px; font-size: 16px; }
  textarea { resize: vertical; min-height: 88px; line-height: 1.6; }

  select option { background: white; }

  /* \u2500\u2500 BUTTONS \u2500\u2500 */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 20px; border-radius: var(--radius);
    border: none; font-family: var(--sans);
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
    text-decoration: none; white-space: nowrap;
  }
